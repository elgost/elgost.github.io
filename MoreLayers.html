<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Vacation Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />


    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
        
        .popup-img {
            width: 200px;
            height: auto;
            border-radius: 8px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-curve/leaflet.curve.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.css" />
    <script src="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.js"></script>

    <script>
        // 1. Initialize the map
        const map = L.map('map').setView([51.505, -0.09], 5);

        // 2. Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Add markers with images
        function addMarker(lat, lng, title, description, imageUrl) {
            const marker = L.marker([lat, lng]).addTo(map);

            const popupContent = `
                <b>${title}</b><br>
                ${description}<br>
                <img src="${imageUrl}" class="popup-img" />
                `;

            marker.bindPopup(popupContent);
        }

        function drawCurvedRoute(stops) {
            const curves = [];
            for (let i = 0; i < stops.length - 1; i++) {

                const start = [stops[i].lat, stops[i].lng];
                const end = [stops[i + 1].lat, stops[i + 1].lng];

                if (stops[i].boat) {
                    // If it's a boat route, use a dashed line
                    const offset = 1; // adjust curve strength

                    const controlPoint = [
                        (start[0] + end[0]) / 2 + offset,
                        (start[1] + end[1]) / 2
                    ];

                    curves.push(L.curve([
                        'M', start,
                        'Q', controlPoint,
                        end
                    ], {
                        color: 'blue',
                        weight: 3,
                        dashArray: '5, 10' // optional: dashed for "sea route"
                    }));
                } else {
                    // For land routes, use a route
                    // L.Routing.control({
                    //     waypoints: [
                    //         [stops[i].lat, stops[i].lng],
                    //         [stops[i + 1].lat, stops[i + 1].lng]
                    //     ],
                    //     routeWhileDragging: true
                    // }).addTo(map);

                    curves.push(L.polyline([start, end], {
                        color: 'red',
                        weight: 3,
                        dashArray: '5, 10' // dashed for "sea route"
                    }));
                }
                // create a curved control point

            }
            return curves;
        }

        const cruiseLayers = {}; // store all cruises
        const tripLayers = []; // store all trips

        let tripData;
        let airportData;
        async function init() {
            const res = await fetch('moretrips.json');
            tripData = await res.json();
            const cruiseTree = loadCruises(tripData);
            tripLayers.push(cruiseTree);

            const airportRes = await fetch('resources/airports.json');
            airportData = await airportRes.json();
            const airportLayer = loadAirports(airportData);

            const tree = {
                label: "Others",
                children: [{
                    label: "Airports",
                    layer: airportLayer
                }]
            };
            tripLayers.push(tree);

            const usares = await fetch('usa.json');
            usaData = await usares.json();
            const usaTree = loadUSA(usaData);

            tripLayers.push(usaTree);

            L.control.layers.tree(null, tripLayers, {
                collapsed: false
            }).addTo(map);
        }

        function createTripLayer(trip) {

            const layer = L.layerGroup();

            const waypoints = [];

            trip.stops.forEach(stop => {

                const marker = L.marker([stop.lat, stop.lng])
                    .bindPopup(`
                <b>${stop.title}</b><br>
                ${stop.description}<br>
                <img src="${stop.image}" class="popup-img"/>
            `);

                marker.addTo(layer);

                waypoints.push([stop.lat, stop.lng]);
            });

            const route = drawCurvedRoute(trip.stops);
            route.forEach(r => r.addTo(layer));

            return layer;
        }

        const overlays = {};

        function loadCruise(cruise) {
            const waypoints = [];

            cruise.stops.forEach(stop => {

                // Add marker with your existing function
                addMarker(
                    stop.lat,
                    stop.lng,
                    stop.title,
                    stop.description,
                    stop.image
                );

                // Collect for polylines
                waypoints.push(L.latLng(stop.lat, stop.lng));
            });

            drawCurvedRoute(trip.stops);
            // L.polyline(waypoints, {
            //     color: 'red'
            // }).addTo(map);
        }

        function loadCruises(data) {
            const tree = {
                label: "Cruise Trips",
                children: []
            };

            data.trips.forEach(trip => {

                const layer = createTripLayer(trip);

                tripLayers[trip.name] = layer;
                overlays[trip.name] = layer;

                tree.children.push({
                    label: trip.name,
                    layer: layer
                });

                layer.addTo(map); // show by default
            });
            return tree;
        }

        function loadUSA(data) {
            const tree = {
                label: "USA Trips",
                children: []
            };
            data.trips.forEach(trip => {

                const layer = createTripLayer(trip);

                tripLayers[trip.name] = layer;
                overlays[trip.name] = layer;

                tree.children.push({
                    label: trip.name,
                    layer: layer
                });

                layer.addTo(map); // show by default
            });
        }

        map.on('click', function(e) {
            const {
                lat,
                lng
            } = e.latlng;

            L.marker([lat, lng])
                .addTo(map)
                .bindPopup(`Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}`)
                .openPopup();

            console.log(lat, lng);
        });


        // Airports

        function loadAirports(data) {
            const layer = L.layerGroup();
            data.airports.forEach(airport => {
                const marker = L.marker([airport.lat, airport.lng])
                    .bindPopup(`
                <b>${airport.code}</b><br>
                ${airport.name}<br>
            `);

                marker.addTo(layer);
            });

            tripLayers["Airports"] = layer;
            overlays["Airports"] = layer;
            layer.addTo(map);

            return layer;
        }

        init();
        // Fit map to route
        //map.fitBounds(route.getBounds());
    </script>

</body>

</html>
